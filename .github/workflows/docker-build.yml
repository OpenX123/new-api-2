name: Publish Docker image (Multi-arch)

on:
  push:
    branches:
      - main
    tags:
      - '*'
      - '!nightly*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (e.g., v0.10.8-alpha.3)'
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      image_owner: ${{ steps.namespace.outputs.owner }}

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Normalize image namespace
        id: namespace
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve tag & write VERSION
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag '$TAG' does not exist"
              exit 1
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="${GITHUB_REF_NAME}-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "${TAG}" > VERSION
          echo "Building tag: ${TAG} for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.namespace.outputs.owner }}/new-api

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ steps.namespace.outputs.owner }}/new-api:${{ env.TAG }}-${{ matrix.arch }}
            ghcr.io/${{ steps.namespace.outputs.owner }}/new-api-2:${{ env.TAG }}-${{ matrix.arch }}
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('ghcr.io/{0}/new-api:latest-{1}', steps.namespace.outputs.owner, matrix.arch) || '' }}
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('ghcr.io/{0}/new-api-2:latest-{1}', steps.namespace.outputs.owner, matrix.arch) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes ghcr.io/${{ steps.namespace.outputs.owner }}/new-api@${{ steps.build.outputs.digest }}
          cosign sign --yes ghcr.io/${{ steps.namespace.outputs.owner }}/new-api-2@${{ steps.build.outputs.digest }}

      - name: Image summary
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ steps.namespace.outputs.owner }}/new-api:${TAG}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ steps.namespace.outputs.owner }}/new-api-2:${TAG}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    env:
      IMAGE_OWNER: ${{ needs.build_single_arch.outputs.image_owner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Set version
        run: echo "TAG=${{ needs.build_single_arch.outputs.tag }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (version)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.IMAGE_OWNER }}/new-api:${TAG} \
            ghcr.io/${{ env.IMAGE_OWNER }}/new-api:${TAG}-amd64

      - name: Create & push manifest (latest)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.IMAGE_OWNER }}/new-api:latest \
            ghcr.io/${{ env.IMAGE_OWNER }}/new-api:latest-amd64

      - name: Create & push fork manifests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.IMAGE_OWNER }}/new-api-2:${TAG} \
            ghcr.io/${{ env.IMAGE_OWNER }}/new-api-2:${TAG}-amd64

      - name: Create & push fork manifest (latest)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.IMAGE_OWNER }}/new-api-2:latest \
            ghcr.io/${{ env.IMAGE_OWNER }}/new-api-2:latest-amd64

      - name: Manifest summary
        run: |
          echo "### Multi-arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${{ env.IMAGE_OWNER }}/new-api:${TAG} >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${{ env.IMAGE_OWNER }}/new-api-2:${TAG} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
